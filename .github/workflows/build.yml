name: Build Extensions

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Cấp quyền ghi để có thể push lên branch builds
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Bỏ phần 'ref: master' chi tiết để dùng mặc định, tránh lỗi fetch
          fetch-depth: 0 

      - name: Setup Environment
        run: chmod +x run.sh

      - name: Run Build Script
        run: ./run.sh

      - name: Deploy to builds branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: builds
          FOLDER: . 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build extensions: {sha}"
          
